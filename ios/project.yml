name: VLC-iOS
options:
  bundleIdPrefix: org.videolan
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  MobileVLCKit:
    url: https://github.com/MobileVLCKit-SPM/MobileVLCKit-SPM
    from: 3.6.0
targets:
  VLC-iOS:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.videolan.vlc-ios
        PRODUCT_NAME: VLC-iOS
        INFOPLIST_FILE: App/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: VLC
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "VLC imports videos and audio from your photo library for playback."
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/build/bin/iosSimulatorArm64/debugFramework
          - $(SRCROOT)/../shared/build/bin/iosArm64/debugFramework
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - VLCShared
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        ENABLE_BITCODE: NO
    dependencies:
      - package: MobileVLCKit
        product: MobileVLCKit
      - framework: ../shared/build/bin/iosSimulatorArm64/debugFramework/VLCShared.framework
        embed: true
        link: true
    preBuildScripts:
      - name: Build VLCShared framework
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          ROOT="${SRCROOT}/.."
          cd "$ROOT"
          if [ "${PLATFORM_NAME:-}" = "iphonesimulator" ]; then
            ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 -q
          else
            ./gradlew :shared:linkDebugFrameworkIosArm64 -q
          fi
